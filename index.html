<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>주아·초아 놀이나라 🎈</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none; touch-action:manipulation; }
html,body { height:100%; overflow:hidden; }
/* 아이폰 사파리: 주소창/하단바에 가려지지 않게 실제 보이는 높이 사용 */
@supports (height:100dvh){ html,body{ height:100dvh; } }
body {
  font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  background:linear-gradient(160deg,#ffd9e8 0%,#d6eaff 50%,#fff3c4 100%);
  display:flex; flex-direction:column;
}
#app { flex:1; display:flex; flex-direction:column; overflow:hidden; position:relative; padding-bottom:env(safe-area-inset-bottom, 0px); }
#fx { position:fixed; inset:0; pointer-events:none; z-index:999; }

/* ===== 헤더 ===== */
.topbar { display:flex; align-items:center; justify-content:space-between; padding:10px 14px; }
.backbtn {
  background:#fff; border:none; border-radius:50%; width:48px; height:48px;
  font-size:24px; box-shadow:0 3px 0 rgba(0,0,0,.12); cursor:pointer;
}
.backbtn:active { transform:scale(.92); }
.title-sm { font-size:19px; font-weight:800; color:#5b4a6e; }

/* ===== 홈 화면 ===== */
.home { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.home-head { text-align:center; padding:16px 10px 6px; }
.home-head h1 { font-size:28px; color:#7a4ddb; text-shadow:2px 2px 0 #fff; letter-spacing:1px; }
.home-head p { font-size:14px; color:#9a8bb0; margin-top:4px; font-weight:700; }

.profiles { display:flex; gap:12px; justify-content:center; padding:12px; }
.profile {
  flex:1; max-width:160px; border:4px solid transparent; border-radius:24px;
  background:#fff; padding:12px 6px; text-align:center; cursor:pointer;
  box-shadow:0 4px 0 rgba(0,0,0,.10); transition:transform .15s;
}
.profile:active { transform:scale(.95); }
.profile .pic { font-size:42px; }
.profile .nm { font-size:18px; font-weight:800; color:#5b4a6e; margin-top:2px; }
.profile .sub { font-size:12px; color:#a99cbe; font-weight:700; }
.profile.sel-uni { border-color:#ff7bac; background:#fff0f6; }
.profile.sel-cho { border-color:#4dabf7; background:#eaf6ff; }

.gamegrid {
  flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch;
  display:grid; grid-template-columns:1fr 1fr; gap:12px;
  /* 아래 여백을 넉넉히: 마지막 게임이 하단바에 안 가리고 스크롤이 더 내려가게 */
  padding:6px 14px calc(170px + env(safe-area-inset-bottom, 0px));
}
.gcard {
  border:none; border-radius:22px; padding:16px 8px 14px; text-align:center; cursor:pointer;
  color:#fff; box-shadow:0 5px 0 rgba(0,0,0,.15); transition:transform .12s;
  display:flex; flex-direction:column; align-items:center; gap:4px;
}
.gcard:active { transform:scale(.94); }
.gcard .gi { font-size:40px; filter:drop-shadow(0 2px 2px rgba(0,0,0,.2)); }
.gcard .gn { font-size:16px; font-weight:800; text-shadow:1px 1px 0 rgba(0,0,0,.18); }
.gcard .gt { font-size:11px; font-weight:700; opacity:.92; }
.gcard .stars { font-size:12px; letter-spacing:1px; }

/* ===== 게임 화면 공통 ===== */
.game { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.progress { display:flex; gap:5px; justify-content:center; padding:2px 10px 8px; }
.pdot { width:13px; height:13px; border-radius:50%; background:#fff; box-shadow:inset 0 0 0 2px rgba(0,0,0,.08); }
.pdot.ok { background:#51cf66; }
.pdot.no { background:#ffa8a8; }
.pdot.cur { background:#ffd43b; transform:scale(1.25); }

.stage { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:10px 16px; gap:14px; overflow:hidden; position:relative; }
.prompt {
  background:#fff; border-radius:26px; padding:16px 22px; text-align:center;
  box-shadow:0 5px 0 rgba(0,0,0,.10); max-width:96%;
}
.prompt .big { font-size:40px; font-weight:900; color:#444; letter-spacing:2px; }
.prompt .mid { font-size:26px; font-weight:800; color:#555; }
.prompt .emo { font-size:52px; line-height:1.2; }
.prompt .hint { font-size:14px; color:#b0a4c4; font-weight:700; margin-top:4px; }

.choices { display:flex; flex-wrap:wrap; gap:14px; justify-content:center; width:100%; }
.choice {
  min-width:90px; padding:18px 22px; border:none; border-radius:24px; cursor:pointer;
  font-size:32px; font-weight:900; color:#fff; box-shadow:0 6px 0 rgba(0,0,0,.18);
  transition:transform .1s;
}
.choice:active { transform:scale(.92); }
.choice.c0{background:#ff8787;} .choice.c1{background:#4dabf7;} .choice.c2{background:#69db7c;}
.choice.c3{background:#ffa94d;} .choice.c4{background:#b197fc;} .choice.c5{background:#f783ac;}
.choice.wrongshake { animation:shake .4s; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-10px)} 75%{transform:translateX(10px)} }

/* 풍선 */
.balloon {
  width:96px; height:116px; border:none; cursor:pointer; color:#fff;
  font-size:30px; font-weight:900; position:relative;
  border-radius:50% 50% 50% 50% / 44% 44% 56% 56%;
  box-shadow:inset -8px -10px 0 rgba(0,0,0,.10), 0 4px 6px rgba(0,0,0,.15);
  animation:float 2.6s ease-in-out infinite;
}
.balloon::after { content:""; position:absolute; bottom:-26px; left:50%; width:2px; height:26px; background:rgba(90,70,110,.4); }
.balloon:nth-child(2){ animation-delay:.4s; } .balloon:nth-child(3){ animation-delay:.9s; }
.balloon:nth-child(4){ animation-delay:1.3s; } .balloon:nth-child(5){ animation-delay:1.7s; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }
.popping { animation:popout .28s forwards !important; }
@keyframes popout { 60%{transform:scale(1.35); opacity:1;} 100%{transform:scale(0); opacity:0;} }

/* 비눗방울 */
.bubble {
  width:84px; height:84px; border-radius:50%; border:none; cursor:pointer;
  font-size:34px; font-weight:900; color:#3b5b8c;
  background:radial-gradient(circle at 32% 30%, #ffffff 0%, #cfe8ff 45%, #9cc8f5 100%);
  box-shadow:0 4px 8px rgba(80,130,200,.35); animation:float 3s ease-in-out infinite;
}
.bubble:nth-child(odd){ animation-delay:.6s; }
.bubble.done { opacity:.18; pointer-events:none; }

/* 타일 */
.tile {
  width:64px; height:64px; border:none; border-radius:16px; cursor:pointer;
  font-size:30px; font-weight:900; color:#6b4f2a;
  background:#ffe8b3; box-shadow:0 4px 0 #d9b86c;
}
.tile:active{ transform:scale(.92); }
.tile.used { opacity:.15; pointer-events:none; }
.slotrow { display:flex; gap:8px; justify-content:center; }
.slot {
  width:58px; height:64px; border-radius:14px; background:rgba(255,255,255,.7);
  border:3px dashed #c9b8e8; font-size:30px; font-weight:900; color:#7a4ddb;
  display:flex; align-items:center; justify-content:center;
}
.slot.fill { border-style:solid; background:#fff; }

/* 사탕/세기 */
.candy {
  font-size:42px; background:none; border:none; cursor:pointer; transition:transform .12s;
  filter:drop-shadow(0 2px 2px rgba(0,0,0,.15));
}
.candy:active{ transform:scale(1.25); }
.candy.got { transform:scale(0); opacity:0; transition:all .25s; }

/* ===== 드래그 게임 ===== */
.draggy { touch-action:none; cursor:grab; position:relative; z-index:5; }
.draggy.dragging { z-index:90; }
.dragitem {
  background:none; border:none; font-size:50px; line-height:1;
  filter:drop-shadow(0 3px 3px rgba(0,0,0,.18));
}
.dragchip {
  background:#fff; border:none; border-radius:20px; padding:10px 16px;
  font-size:24px; font-weight:900; color:#3b5b8c; box-shadow:0 4px 0 rgba(0,0,0,.13);
  display:flex; align-items:center; gap:6px;
}
.dz {
  border:4px dashed #b9a7e0; border-radius:24px; background:rgba(255,255,255,.6);
  min-width:104px; min-height:96px; padding:8px 12px;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;
  font-weight:900; color:#7a4ddb; font-size:20px; text-align:center;
}
.dz .dzi { font-size:38px; line-height:1.15; }
.dz.glow { border-color:#51cf66; background:#ebfbee; animation:dzpulse .5s; }
@keyframes dzpulse { 50%{ transform:scale(1.08);} }
.dzrow { display:flex; gap:14px; justify-content:center; flex-wrap:wrap; width:100%; }
.dragrow { display:flex; flex-wrap:wrap; gap:16px; justify-content:center; width:100%; padding:6px; }

/* 결과 화면 */
.endwrap { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; padding:20px; text-align:center; }
.endwrap .bigstar { font-size:64px; letter-spacing:6px; animation:bounce 1s infinite alternate; }
@keyframes bounce { from{transform:translateY(0)} to{transform:translateY(-12px)} }
.endwrap h2 { font-size:30px; color:#7a4ddb; }
.endwrap .msg { font-size:17px; color:#8a7ba3; font-weight:700; }
.bigbtn {
  border:none; border-radius:26px; padding:16px 36px; font-size:21px; font-weight:800;
  color:#fff; cursor:pointer; box-shadow:0 5px 0 rgba(0,0,0,.18);
}
.bigbtn:active{ transform:scale(.95); }
.bb-purple{ background:#9775fa; } .bb-pink{ background:#ff7bac; } .bb-blue{ background:#4dabf7; }
.bb-green{ background:#40c057; }

/* 타이머/점수 */
.hud { display:flex; gap:10px; align-items:center; justify-content:center; padding-bottom:6px; }
.hudbox { background:#fff; border-radius:16px; padding:6px 16px; font-size:18px; font-weight:900; color:#5b4a6e; box-shadow:0 3px 0 rgba(0,0,0,.1); }

.speakbtn {
  background:#fff; border:none; border-radius:50%; width:62px; height:62px; font-size:30px;
  box-shadow:0 4px 0 rgba(0,0,0,.12); cursor:pointer;
}
.speakbtn:active{ transform:scale(.9); }
</style>
</head>
<body>
<div id="app"></div>
<canvas id="fx"></canvas>
<script>
"use strict";
/* ================= 공통 시스템 ================= */
const $app = document.getElementById('app');
let mode = 'uni'; // uni = 언니(6세 주아), cho = 동생(4세 초아)
let bestStars = {};
try { bestStars = JSON.parse(localStorage.getItem('jc_stars')||'{}'); } catch(e){ bestStars = {}; }
function saveStars(gid, n){
  const key = gid+'_'+mode;
  if((bestStars[key]||0) < n){ bestStars[key]=n; try{ localStorage.setItem('jc_stars', JSON.stringify(bestStars)); }catch(e){} }
}

/* ---- 사운드 (Web Audio) ---- */
let AC = null;
function ac(){ if(!AC){ try{ AC = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(AC&&AC.state==='suspended')AC.resume(); return AC; }
function tone(freq, dur, type, vol, when){
  const c = ac(); if(!c) return;
  const o = c.createOscillator(), g = c.createGain();
  o.type = type||'sine'; o.frequency.value = freq;
  g.gain.setValueAtTime(vol||0.25, c.currentTime+(when||0));
  g.gain.exponentialRampToValueAtTime(0.001, c.currentTime+(when||0)+dur);
  o.connect(g); g.connect(c.destination);
  o.start(c.currentTime+(when||0)); o.stop(c.currentTime+(when||0)+dur+0.05);
}
function sndPop(){ tone(880+Math.random()*440, .12, 'square', .15); tone(1500+Math.random()*500, .08, 'sine', .12); }
function sndGood(){ tone(523,.12,'sine',.25); tone(659,.12,'sine',.25,.10); tone(784,.2,'sine',.25,.20); }
function sndWrong(){ tone(220,.25,'sawtooth',.12); tone(180,.3,'sawtooth',.10,.08); }
function sndTap(){ tone(660,.07,'square',.12); }
function sndFanfare(){ [523,659,784,1047,784,1047].forEach((f,i)=>tone(f,.18,'sine',.22,i*.13)); }

/* ---- 말하기 (좋은 목소리 고르기 + 한국어 지문 읽어주기) ---- */
let enVoice = null, koVoice = null;
function loadVoices(){
  try{
    const vs = speechSynthesis.getVoices();
    const score = v => (/Google/i.test(v.name)?4:0) + (/Natural|Premium|Enhanced|Neural|Siri/i.test(v.name)?5:0) + (/Samantha|Aria|Jenny|Ava|Allison/i.test(v.name)?2:0);
    const en = vs.filter(v=>/^en[-_]US/i.test(v.lang)).sort((a,b)=>score(b)-score(a));
    enVoice = en[0] || vs.find(v=>/^en/i.test(v.lang)) || null;
    const ko = vs.filter(v=>/^ko/i.test(v.lang)).sort((a,b)=>score(b)-score(a));
    koVoice = ko[0] || null;
  }catch(e){}
}
try{ speechSynthesis.onvoiceschanged = loadVoices; loadVoices(); }catch(e){}
function speak(txt){ /* 영어: 또박또박 천천히, 줄 서서 차례로 말함 */
  try{
    if(!enVoice) loadVoices();
    const u = new SpeechSynthesisUtterance(txt);
    u.lang = 'en-US'; if(enVoice) u.voice = enVoice;
    u.rate = 0.72; u.pitch = 1.05; u.volume = 1;
    speechSynthesis.speak(u);
  }catch(e){}
}
function speakKo(txt){ /* 한국어 지문: 하던 말 멈추고 바로 읽어줌 */
  try{
    if(!koVoice) loadVoices();
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(txt);
    u.lang = 'ko-KR'; if(koVoice) u.voice = koVoice;
    u.rate = 0.95; u.volume = 1;
    speechSynthesis.speak(u);
  }catch(e){}
}
const KO_NUM = ['하나','둘','셋','넷','다섯','여섯','일곱','여덟','아홉','열'];

/* ---- 파티클 (팡팡 효과) ---- */
const fxc = document.getElementById('fx'), fxx = fxc.getContext('2d');
let parts = [];
function fitFx(){ fxc.width = innerWidth; fxc.height = innerHeight; }
addEventListener('resize', fitFx); fitFx();
const COLORS = ['#ff6b8a','#ffd43b','#69db7c','#4dabf7','#b197fc','#ffa94d','#66d9e8'];
function burst(x, y, n, big){
  for(let i=0;i<(n||26);i++){
    const a = Math.random()*Math.PI*2, sp = (big?5:3)+Math.random()*(big?7:5);
    parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-3,life:1,sz:(big?6:4)+Math.random()*6,
      col:COLORS[Math.floor(Math.random()*COLORS.length)], shape:Math.random()<.3?'star':'rect', rot:Math.random()*6});
  }
}
function fireworks(){
  let k = 0;
  const iv = setInterval(()=>{
    burst(40+Math.random()*(innerWidth-80), 60+Math.random()*(innerHeight*0.55), 36, true);
    sndPop();
    if(++k>=6) clearInterval(iv);
  }, 320);
}
(function loop(){
  fxx.clearRect(0,0,fxc.width,fxc.height);
  parts = parts.filter(p=>p.life>0);
  for(const p of parts){
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.22; p.life-=0.018; p.rot+=0.1;
    fxx.globalAlpha = Math.max(p.life,0); fxx.fillStyle = p.col;
    fxx.save(); fxx.translate(p.x,p.y); fxx.rotate(p.rot);
    if(p.shape==='star'){
      fxx.beginPath();
      for(let i=0;i<5;i++){
        fxx.lineTo(Math.cos(i*1.257)*p.sz, Math.sin(i*1.257)*p.sz);
        fxx.lineTo(Math.cos(i*1.257+0.628)*p.sz*0.45, Math.sin(i*1.257+0.628)*p.sz*0.45);
      }
      fxx.fill();
    } else fxx.fillRect(-p.sz/2,-p.sz/2,p.sz,p.sz);
    fxx.restore();
  }
  fxx.globalAlpha = 1;
  requestAnimationFrame(loop);
})();
function burstAt(el, big){
  const r = el.getBoundingClientRect();
  burst(r.left+r.width/2, r.top+r.height/2, big?40:26, big);
}

/* ---- 드래그 도우미 (손가락으로 끌기) ---- */
function makeDrag(elm, zonesFn, onDrop){
  elm.classList.add('draggy');
  let drag = false, sx = 0, sy = 0;
  elm.addEventListener('pointerdown', e=>{
    if(elm.dataset.dead) return;
    e.preventDefault();
    drag = true; sx = e.clientX; sy = e.clientY;
    try{ elm.setPointerCapture(e.pointerId); }catch(err){}
    elm.classList.add('dragging');
    elm.style.transition = 'none';
    sndTap();
  });
  elm.addEventListener('pointermove', e=>{
    if(!drag) return;
    elm.style.transform = 'translate('+(e.clientX-sx)+'px,'+(e.clientY-sy)+'px) scale(1.15)';
  });
  function finish(e, cancelled){
    if(!drag) return; drag = false;
    elm.classList.remove('dragging');
    let consumed = false;
    if(!cancelled){
      const hit = zonesFn().find(z=>{
        const r = z.getBoundingClientRect();
        return e.clientX>=r.left && e.clientX<=r.right && e.clientY>=r.top && e.clientY<=r.bottom;
      });
      consumed = onDrop(hit||null, elm);
    }
    if(!consumed){
      elm.style.transition = 'transform .3s';
      elm.style.transform = '';
    }
  }
  elm.addEventListener('pointerup', e=>finish(e,false));
  elm.addEventListener('pointercancel', e=>finish(e,true));
}

/* ---- 유틸 ---- */
const ri = (a,b)=>a+Math.floor(Math.random()*(b-a+1));
const pick = arr=>arr[Math.floor(Math.random()*arr.length)];
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function el(tag, cls, html){ const e=document.createElement(tag); if(cls)e.className=cls; if(html!=null)e.innerHTML=html; return e; }

/* ================= 게임 프레임워크 ================= */
const games = [];

function goHome(){ try{ speechSynthesis.cancel(); }catch(e){} renderHome(); }

function startGame(g){
  ac();
  const R = g.rounds || 10;
  let round = 0, correct = 0, results = [];
  $app.innerHTML = '';
  const top = el('div','topbar');
  const back = el('button','backbtn','🏠');
  back.onclick = ()=>{ sndTap(); goHome(); };
  top.appendChild(back);
  top.appendChild(el('div','title-sm', g.icon+' '+g.name));
  top.appendChild(el('div','', '<div style="width:48px"></div>'));
  $app.appendChild(top);
  const prog = el('div','progress');
  for(let i=0;i<R;i++) prog.appendChild(el('div','pdot'+(i===0?' cur':'')));
  $app.appendChild(prog);
  const stage = el('div','stage');
  $app.appendChild(stage);

  function updateProg(){
    [...prog.children].forEach((d,i)=>{
      d.className = 'pdot' + (results[i]===true?' ok':results[i]===false?' no':i===round?' cur':'');
    });
  }
  function next(ok){
    results[round] = ok; if(ok) correct++;
    round++;
    updateProg();
    if(round>=R){ setTimeout(()=>endScreen(), 600); }
    else setTimeout(()=>{ stage.innerHTML=''; g.round(stage, ctx); }, 650);
  }
  function endScreen(){
    const stars = correct>=R*0.85?3:correct>=R*0.55?2:1;
    saveStars(g.id, stars);
    stage.remove(); prog.remove();
    const w = el('div','endwrap');
    w.appendChild(el('div','bigstar', '⭐'.repeat(stars)));
    w.appendChild(el('h2','', stars===3?'와! 최고야!! 🎉':stars===2?'정말 잘했어! 👏':'재밌게 놀았네! 😊'));
    w.appendChild(el('div','msg', R+'문제 중에 <b style="color:#ff7bac">'+correct+'개</b> 성공!'));
    const b1 = el('button','bigbtn bb-pink','한 번 더! 🔄');
    b1.onclick = ()=>{ sndTap(); startGame(g); };
    const b2 = el('button','bigbtn bb-purple','다른 게임 하기 🏠');
    b2.onclick = ()=>{ sndTap(); goHome(); };
    w.appendChild(b1); w.appendChild(b2);
    $app.appendChild(w);
    sndFanfare(); fireworks();
    speakKo(stars===3?'와, 최고야! 별 세 개!':stars===2?'정말 잘했어!':'재밌게 잘 놀았어!');
  }
  /* 게임이 쓰는 도구 모음 */
  const ctx = {
    mode, next, sndPop, sndGood, sndWrong, sndTap, burstAt, burst, speak, say:speakKo, makeDrag,
    ri, pick, shuffle, el,
    choiceRow(stage, choices, onDone){
      const row = el('div','choices');
      shuffle(choices).forEach((c,i)=>{
        const b = el('button','choice c'+(i%6), c.label);
        b.onclick = ()=>{
          if(b.dataset.dead) return;
          if(c.correct){
            row.querySelectorAll('.choice').forEach(x=>x.dataset.dead=1);
            sndPop(); sndGood(); burstAt(b, true);
            b.classList.add('popping');
            onDone(true);
          } else {
            sndWrong(); b.classList.add('wrongshake');
            b.dataset.dead=1; b.style.opacity=.35;
            setTimeout(()=>b.classList.remove('wrongshake'),450);
            onDone(false);
          }
        };
        row.appendChild(b);
      });
      stage.appendChild(row);
      return row;
    }
  };
  g.round(stage, ctx);

const BALLOON_COLORS = ['#ff6b8a','#4dabf7','#69db7c','#ffa94d','#b197fc'];
function balloonRow(stage, choices, ctx, onDone){
  const row = el('div','choices');
  ctx.shuffle(choices).forEach((c,i)=>{
    const b = el('button','balloon', c.label);
    b.style.background = BALLOON_COLORS[i%BALLOON_COLORS.length];
    b.onclick = ()=>{
      if(b.dataset.dead) return;
      if(c.correct){
        row.querySelectorAll('.balloon').forEach(x=>x.dataset.dead=1);
        sndPop(); sndGood(); ctx.burstAt(b, true);
        b.classList.add('popping');
        onDone(true);
      } else {
        sndPop(); ctx.burstAt(b);
        b.classList.add('popping'); b.dataset.dead=1;
        setTimeout(()=>{ b.style.visibility='hidden'; }, 300);
        sndWrong();
        onDone(false);
      }
    };
    row.appendChild(b);
  });
  stage.appendChild(row);
}
function nearWrong(ans, ctx){
  const s = new Set([ans]);
  while(s.size<3){
    let w = ans + ctx.pick([-10,-2,-1,1,2,10,3,-3]);
    if(w<0) w = ans + ctx.ri(1,3);
    s.add(w);
  }
  return [...s].map(v=>({label:v, correct:v===ans}));
}
/* 주아용: 1의 자리·10의 자리 섞인 문제 만들기 */
function mixedProblem(ctx){
  const style = ctx.pick(['2d1d','2d1d','1d1d','2d2d']);
  let a, b;
  if(style==='1d1d'){ a=ctx.ri(3,9); b=ctx.ri(2,9); }
  else if(style==='2d1d'){ a=ctx.ri(11,79); b=ctx.ri(2,9); }
  else { a=ctx.ri(11,55); b=ctx.ri(11,40); }
  let op = Math.random()<0.5 ? '+' : '−';
  if(op==='−' && b>a){ const t=a; a=b; b=t; }
  const ans = op==='+' ? a+b : a-b;
  return {a, b, op, ans, koOp: op==='+'?'더하기':'빼기'};
}
const CNT_EMOJI = ['🍎','🍓','🐤','🐟','🌟','🧁','🐞','🎈','🍩','🐰'];

      const s = new Set([ans]); while(s.size<3) s.add(AZ[ctx.ri(0,25)]);
      ctx.choiceRow(stage, [...s].map(L=>({label:L,correct:L===ans})), ok=>{
        if(ok){ ctx.speak(word); ctx.next(first); } else first=false;
      });
    } else {
      const st = ctx.ri(0,10), miss = ctx.ri(1,2);
      const seq = [AZ[st],AZ[st+1],AZ[st+2],AZ[st+3]];
      const ans = seq[miss];
      const html = seq.map((c,i)=>i===miss?'<span style="color:#fab005">❓</span>':c).join('&nbsp; ');
      stage.appendChild(el('div','prompt','<div class="big">'+html+'</div><div class="hint">❓는 무슨 글자일까?</div>'));
      ctx.say('알파벳이 순서대로 서 있어. 물음표 자리에 올 글자를 골라 봐!');
      const s = new Set([ans]); while(s.size<3) s.add(AZ[ctx.ri(0,25)]);
      ctx.choiceRow(stage, [...s].map(L=>({label:L,correct:L===ans})), ok=>{
        if(ok){ ctx.speak(seq.join(', ')); ctx.next(first); } else first=false;
      });
    }
  }
});

/* 10. 알파벳 사냥 */
games.push({
  id:'hunt', name:'알파벳 사냥', icon:'🔤', tag:'글자 찾기 대장!', color:'linear-gradient(135deg,#63e6be,#20c997)',
  round(stage, ctx){
    let first = true;
    if(ctx.mode==='uni'){
      const five = pickWords(ctx,5);
      const answer = five[0];
      const ans = answer[0][0].toUpperCase();
      stage.appendChild(el('div','prompt','<div class="emo">'+answer[1]+'</div><div class="mid">'+answer[0]+'</div><div class="hint">이 단어는 무슨 글자로 시작할까?</div>'));
      ctx.say('이 단어가 무슨 글자로 시작하는지 골라 봐!');
      ctx.speak(answer[0]);
      const s = new Set([ans]);
      for(const w of five.slice(1)){ if(s.size<3 && w[0][0].toUpperCase()!==ans) s.add(w[0][0].toUpperCase()); }
      while(s.size<3) s.add(AZ[ctx.ri(0,25)]);
      ctx.choiceRow(stage, [...s].map(L=>({label:L,correct:L===ans})), ok=>{ if(ok)ctx.next(first); else first=false; });
    } else {
      const lookalike = { B:['P','R','D'], O:['Q','C','G'], M:['W','N','H'], E:['F','L','B'], I:['J','L','T'], A:['V','H','K'], S:['Z','C','J'], U:['V','Y','W'] };
      const keys = Object.keys(lookalike);
      const target = keys[ctx.ri(0,keys.length-1)];
      stage.appendChild(el('div','prompt','<div class="big" style="color:#20c997">'+target+'</div><div class="hint">아래에서 똑같은 글자를 찾아 팡!</div>'));
      ctx.say('위에 있는 글자랑 똑같은 글자를 아래에서 찾아 봐!');
      ctx.speak(target);
      const opts = ctx.shuffle(lookalike[target]).slice(0,2).concat([target]);
      ctx.choiceRow(stage, opts.map(L=>({label:L,correct:L===target})), ok=>{ if(ok)ctx.next(first); else first=false; });
    }
  }
});

/* 11. 공 바구니 — 공을 끌어다 넣기 */
games.push({
  id:'basket', rounds:6, name:'공 바구니', icon:'🧺', tag:'✋ 끌어서 쏙!', color:'linear-gradient(135deg,#a9e34b,#82c91e)',
  round(stage, ctx){
    let need, first = true, done = false, got = 0;
    if(ctx.mode==='uni'){
      const a = ctx.ri(1,4), b = ctx.ri(1,5); need = a+b;
      stage.appendChild(el('div','prompt','<div class="big">'+a+' + '+b+'</div><div class="hint">계산한 만큼 공을 바구니에 끌어다 넣고 [다 넣었어!]를 눌러</div>'));
      ctx.say(a+' 더하기 '+b+'! 계산한 개수만큼 공을 바구니에 끌어다 넣고, 다 넣었어 버튼을 눌러 줘!');
    } else {
      need = ctx.ri(1,4);
      stage.appendChild(el('div','prompt','<div class="mid">공 <b style="color:#e8590c">'+need+'개</b>를 바구니에!</div><div class="hint">손가락으로 끌어다 넣어줘</div>'));
      ctx.say('공을 '+need+'개, 바구니에 끌어다 넣어 줘! 같이 세어 보자!');
    }
    const dz = el('div','dz','<div class="dzi">🧺</div><div id="bc">0개</div>');
    stage.appendChild(dz);
    const row = el('div','dragrow');
    const total = need + 3;
    for(let i=0;i<total;i++){
      const b = el('button','dragitem','⚽');
      ctx.makeDrag(b, ()=>[dz], (hit, elm)=>{
        if(done || !hit) return false;
        got++;
        elm.dataset.dead = 1; elm.style.visibility = 'hidden';
        sndPop(); ctx.burstAt(dz); dz.classList.add('glow'); setTimeout(()=>dz.classList.remove('glow'),500);
        dz.querySelector('#bc').textContent = got+'개';
        if(ctx.mode==='cho'){
          speakKo(KO_NUM[got-1]+'!');
          if(got===need){ done=true; sndGood(); setTimeout(()=>{ speakKo('딱 맞았어! 최고야!'); ctx.next(true); }, 600); }
          else if(got>need){ done=true; sndWrong(); setTimeout(()=>ctx.next(false), 600); }
        }
        return true;
      });
      row.appendChild(b);
    }
    stage.appendChild(row);
    if(ctx.mode==='uni'){
      const chk = el('button','bigbtn bb-green','다 넣었어! ✅');
      chk.onclick = ()=>{
        if(done) return; done = true;
        if(got===need){ sndGood(); ctx.burstAt(dz,true); speakKo('딩동댕! 정답이야!'); ctx.next(first); }
        else { sndWrong(); speakKo('음, 다시 세어 볼까? '+need+'개를 넣어야 해!'); done=false; first=false; }
      };
      stage.appendChild(chk);
    }
  }
});

games.push({

  round(stage, ctx){

games.push({
  id:'sort', rounds:6, name:'과일 나누기', icon:'🍎', tag:'✋ 알맞은 바구니로!', color:'linear-gradient(135deg,#ff8787,#fa5252)',
  round(stage, ctx){
    let first = true, left = 4;
    let zA, zB, items;
    if(ctx.mode==='uni'){
      stage.appendChild(el('div','prompt','<div class="mid">숫자를 나눠 담아줘!</div><div class="hint">10보다 작으면 왼쪽, 크면 오른쪽</div>'));
      ctx.say('숫자가 10보다 작으면 왼쪽 바구니에, 10보다 크면 오른쪽 바구니에 끌어다 담아 줘!');
      zA = el('div','dz','<div class="dzi">🧺</div><div>10보다 작아</div>');
      zB = el('div','dz','<div class="dzi">🧺</div><div>10보다 커</div>');
      const nums = [];
      while(nums.length<4){ const v = Math.random()<0.5?ctx.ri(1,9):ctx.ri(11,30); if(!nums.includes(v)) nums.push(v); }
      items = nums.map(v=>({label:v, zone:v<10?'A':'B'}));
    } else {
      stage.appendChild(el('div','prompt','<div class="mid">같은 과일끼리 모아줘!</div><div class="hint">사과는 사과 바구니로!</div>'));
      ctx.say('같은 과일끼리 바구니에 모아 줘! 사과는 사과 바구니, 바나나는 바나나 바구니!');
      zA = el('div','dz','<div class="dzi">🍎</div>');
      zB = el('div','dz','<div class="dzi">🍌</div>');
      items = ctx.shuffle([{label:'🍎',zone:'A'},{label:'🍎',zone:'A'},{label:'🍌',zone:'B'},{label:'🍌',zone:'B'}]);
    }
    const zrow = el('div','dzrow');
    zrow.appendChild(zA); zrow.appendChild(zB);
    stage.appendChild(zrow);
    const row = el('div','dragrow');
    ctx.shuffle(items).forEach(it=>{
      const d = el('button', ctx.mode==='uni'?'dragchip':'dragitem', it.label);
      ctx.makeDrag(d, ()=>[zA,zB], (hit, elm)=>{
        if(!hit) return false;
        const okZone = (hit===zA && it.zone==='A') || (hit===zB && it.zone==='B');
        if(okZone){
          sndPop(); ctx.burstAt(hit); hit.classList.add('glow'); setTimeout(()=>hit.classList.remove('glow'),500);
          elm.dataset.dead = 1; elm.style.visibility = 'hidden';
          left--;
          if(left===0){ sndGood(); speakKo('우와, 다 나눴다! 잘했어!'); ctx.next(first); }
          return true;
        }
        sndWrong(); first = false;
        return false;
      });
      row.appendChild(d);
    });
    stage.appendChild(row);
  }
});
